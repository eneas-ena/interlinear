<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia Interlinear — Gênesis 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F1B33;
    --gold:#C9A227;
    --paper:#FAF7F0;
    --card:#FFFFFF;
    --ink:#0F1B33;
    --muted:#6B6456;
    --line:#E7E0D1;
    --gold-soft:rgba(201,162,39,.12);
    --shadow:0 1px 2px rgba(15,27,51,.05), 0 8px 24px rgba(15,27,51,.06);
    --shadow-hi:0 2px 6px rgba(15,27,51,.08), 0 14px 34px rgba(15,27,51,.12);
    --radius:14px;
  }
  [data-theme="dark"]{
    --navy:#0B1526;
    --gold:#D8B24A;
    --paper:#0B1526;
    --card:#12203C;
    --ink:#F3EFE4;
    --muted:#A9A28E;
    --line:#25355A;
    --gold-soft:rgba(216,178,74,.14);
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.35);
    --shadow-hi:0 2px 8px rgba(0,0,0,.4), 0 16px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Cormorant Garamond",Georgia,serif;
    -webkit-font-smoothing:antialiased;
    transition:background .3s ease,color .3s ease;
    padding-bottom:64px;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:20;
    background:color-mix(in srgb,var(--paper) 82%,transparent);
    backdrop-filter:saturate(1.2) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1180px;margin:0 auto;padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand-mark{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(140deg,var(--navy),#1c2f52);
    display:grid;place-items:center;
    border:1px solid var(--gold);
    box-shadow:0 0 0 3px var(--gold-soft);
  }
  .brand-mark span{font-family:"Cinzel",serif;color:var(--gold);font-weight:700;font-size:16px;line-height:1}
  .brand-title{font-family:"Cinzel",serif;font-weight:600;font-size:15px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .pill{
    font-family:"Cinzel",serif;font-size:11px;letter-spacing:.05em;
    padding:7px 12px;border-radius:999px;cursor:pointer;
    border:1px solid var(--line);background:transparent;color:var(--muted);
    transition:all .18s ease;user-select:none;white-space:nowrap;
  }
  .pill:hover{border-color:var(--gold);color:var(--ink)}
  .pill[aria-pressed="true"]{
    background:var(--navy);color:#F5EED8;border-color:var(--navy);
  }
  [data-theme="dark"] .pill[aria-pressed="true"]{background:var(--gold);color:var(--navy);border-color:var(--gold)}
  .icon-btn{
    width:38px;height:38px;border-radius:999px;border:1px solid var(--line);
    background:transparent;cursor:pointer;display:grid;place-items:center;color:var(--muted);
    transition:all .18s ease;
  }
  .icon-btn:hover{border-color:var(--gold);color:var(--gold)}

  /* ---------- Chapter header ---------- */
  .chapter-nav{
    max-width:1180px;margin:28px auto 0;padding:0 20px;
    display:flex;align-items:center;justify-content:center;gap:20px;
  }
  .chapter-nav h1{
    font-family:"Cinzel",serif;font-weight:700;font-size:clamp(26px,5vw,40px);
    margin:0;letter-spacing:.02em;
  }
  .navarrow{
    background:transparent;border:none;cursor:pointer;color:var(--gold);
    font-size:26px;line-height:1;padding:6px 8px;border-radius:8px;transition:transform .15s ease,opacity .2s;
  }
  .navarrow:hover{transform:scale(1.15)}

  .section-title{
    text-align:center;margin:26px auto 4px;
  }
  .section-title .kicker{
    font-family:"Cinzel",serif;font-size:11px;letter-spacing:.34em;color:var(--gold);text-transform:uppercase;
    display:block;margin-bottom:8px;
  }
  .section-title h2{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:600;
    font-size:clamp(24px,4vw,34px);margin:0;color:var(--ink);
  }
  .xrefs{
    text-align:center;color:var(--muted);font-style:italic;font-size:17px;margin:4px 0 0;
  }
  .xrefs a{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold)}

  .rule{
    max-width:220px;margin:22px auto 6px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    position:relative;
  }
  .rule::after{
    content:"✦";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    color:var(--gold);font-size:12px;background:var(--paper);padding:0 10px;
  }

  /* ---------- Verses ---------- */
  main{max-width:1180px;margin:0 auto;padding:8px 16px 40px}
  .verse{margin:30px 0 8px}
  .verse-flow{
    direction:rtl;display:flex;flex-wrap:wrap;gap:12px;align-items:stretch;justify-content:flex-start;
  }
  .vnum{
    direction:ltr;flex:0 0 auto;align-self:center;
    width:34px;height:34px;border-radius:999px;
    display:grid;place-items:center;margin-inline-end:2px;
    font-family:"Cinzel",serif;font-weight:700;font-size:14px;
    color:var(--gold);border:1.5px solid var(--gold);background:var(--gold-soft);
  }

  .reading{
    direction:ltr;margin:14px 4px 0;padding:12px 16px;border-inline-start:3px solid var(--gold);
    background:var(--gold-soft);border-radius:0 10px 10px 0;
    font-size:20px;line-height:1.5;color:var(--ink);display:none;
  }
  body.show-reading .reading{display:block}
  .reading .rlabel{
    display:block;font-family:"Cinzel",serif;font-size:10px;letter-spacing:.24em;
    text-transform:uppercase;color:var(--gold);margin-bottom:4px;
  }

  /* ---------- Word card ---------- */
  .word{
    direction:ltr;flex:0 0 auto;min-width:96px;max-width:150px;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 12px 10px;text-align:center;cursor:pointer;
    box-shadow:var(--shadow);position:relative;
    transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;
  }
  .word:hover,.word:focus-visible{
    transform:translateY(-3px);box-shadow:var(--shadow-hi);border-color:var(--gold);outline:none;
  }
  .word:focus-visible{box-shadow:var(--shadow-hi),0 0 0 3px var(--gold-soft)}
  .strong{
    font-family:"Cinzel",serif;font-size:11px;font-weight:600;letter-spacing:.04em;
    color:var(--gold);margin-bottom:6px;display:inline-flex;align-items:center;gap:4px;
  }
  .strong::before{content:"⌗";font-size:11px;opacity:.7}
  .heb{
    font-family:"Frank Ruhl Libre",serif;direction:rtl;
    font-size:30px;line-height:1.25;color:var(--ink);margin:2px 0 6px;
    min-height:38px;font-weight:500;
  }
  .translit{font-style:italic;color:var(--muted);font-size:16px;line-height:1.2;margin-bottom:6px}
  body.hide-translit .translit{display:none}
  .gloss{font-size:20px;font-weight:600;color:var(--ink);line-height:1.15;margin-bottom:2px}
  .gloss.marker{color:var(--muted);font-weight:500}
  .gloss-en{font-size:14px;font-style:italic;color:var(--muted);line-height:1.1;margin-top:2px;display:none}
  body.show-en .gloss-en{display:block}
  .morph{
    margin-top:8px;padding-top:7px;border-top:1px dashed var(--line);
    font-family:"Cinzel",serif;font-size:9.5px;letter-spacing:.03em;color:var(--muted);
    text-transform:none;
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(11,21,38,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:18px;z-index:50;
  }
  .overlay.open{display:flex}
  .modal{
    background:var(--card);border:1px solid var(--line);border-top:4px solid var(--gold);
    border-radius:16px;max-width:440px;width:100%;box-shadow:var(--shadow-hi);
    padding:26px 26px 22px;position:relative;animation:pop .22s ease;
    max-height:88vh;overflow:auto;
  }
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .modal .close{
    position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:999px;
    border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;
  }
  .modal .close:hover{border-color:var(--gold);color:var(--gold)}
  .m-strong{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.1em;color:var(--gold)}
  .m-heb{font-family:"Frank Ruhl Libre",serif;direction:rtl;font-size:44px;line-height:1.2;margin:6px 0 2px;color:var(--ink)}
  .m-translit{font-style:italic;font-size:20px;color:var(--muted);margin-bottom:14px}
  .m-row{margin:12px 0;padding-top:12px;border-top:1px solid var(--line)}
  .m-label{
    font-family:"Cinzel",serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--gold);display:block;margin-bottom:4px;
  }
  .m-value{font-size:19px;line-height:1.4;color:var(--ink)}
  .m-value.def{font-size:18px}
  .m-note{font-size:16px;font-style:italic;color:var(--muted);margin-top:5px}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--navy);color:#F5EED8;padding:11px 20px;border-radius:999px;
    font-size:15px;box-shadow:var(--shadow-hi);opacity:0;pointer-events:none;
    transition:all .25s ease;z-index:60;border:1px solid var(--gold);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  footer{
    text-align:center;color:var(--muted);font-size:14px;font-style:italic;
    padding:10px 20px 4px;
  }

  /* ---------- Mobile verse pager ---------- */
  .pager{
    display:none;position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:color-mix(in srgb,var(--paper) 88%,transparent);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    align-items:center;justify-content:space-between;gap:12px;
  }
  .pager button{
    font-family:"Cinzel",serif;font-size:12px;letter-spacing:.04em;
    padding:9px 16px;border-radius:999px;cursor:pointer;
    border:1px solid var(--gold);background:var(--navy);color:#F5EED8;
    display:inline-flex;align-items:center;gap:6px;transition:opacity .2s,transform .12s;
  }
  [data-theme="dark"] .pager button{background:var(--gold);color:var(--navy)}
  .pager button:active{transform:scale(.96)}
  .pager button:disabled{opacity:.35;cursor:default;background:transparent;color:var(--muted);border-color:var(--line)}
  .pager .counter{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.1em;color:var(--gold)}
  body.mobile .pager{display:flex}
  body.mobile{padding-bottom:80px}
  body.mobile .verse{display:none}
  body.mobile .verse.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  body.mobile footer{display:none}

  @media (max-width:520px){
    .word{min-width:78px;max-width:31vw;padding:10px 8px 8px}
    .heb{font-size:25px;min-height:32px}
    .gloss{font-size:17px}
    .translit{font-size:14px}
    .brand-title{display:none}
    .verse-flow{gap:8px}
    .reading{font-size:18px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark"><span>ה</span></div>
        <div class="brand-title">Bíblia Interlinear</div>
      </div>
      <div class="controls">
        <button class="pill" id="t-translit" aria-pressed="true">Transliteração</button>
        <button class="pill" id="t-en" aria-pressed="false">Inglês</button>
        <button class="pill" id="t-reading" aria-pressed="false">Leitura corrida</button>
        <button class="icon-btn" id="t-theme" title="Alternar tema" aria-label="Alternar tema">
          <svg id="theme-ico" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <nav class="chapter-nav">
    <button class="navarrow" data-nav>&#9664;</button>
    <h1>Gênesis 1</h1>
    <button class="navarrow" data-nav>&#9654;</button>
  </nav>

  <div class="section-title">
    <span class="kicker">Passagem paralela</span>
    <h2>A Criação</h2>
  </div>
  <p class="xrefs">(<a href="#" data-nav>João 1:1–5</a>; <a href="#" data-nav>Hebreus 11:1–3</a>)</p>

  <div class="rule"></div>

  <main id="text"></main>

  <footer>Protótipo — Gênesis 1:1–2 · Toque em qualquer palavra para ver o léxico e a análise gramatical.</footer>

  <!-- Navegação por versículo (somente mobile) -->
  <div class="pager" id="pager">
    <button id="p-prev">&#8249; Anterior</button>
    <span class="counter" id="p-count"></span>
    <button id="p-next">Próximo &#8250;</button>
  </div>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="m-gloss">
      <button class="close" id="m-close" aria-label="Fechar">&times;</button>
      <div class="m-strong" id="m-strong"></div>
      <div class="m-heb" id="m-heb"></div>
      <div class="m-translit" id="m-translit"></div>

      <div class="m-row">
        <span class="m-label">Tradução</span>
        <div class="m-value" id="m-gloss"></div>
        <div class="m-note" id="m-glossen"></div>
      </div>

      <div class="m-row">
        <span class="m-label">Léxico (Strong)</span>
        <div class="m-value def" id="m-def"></div>
      </div>

      <div class="m-row">
        <span class="m-label">Análise gramatical</span>
        <div class="m-value" id="m-morph"></div>
        <div class="m-note" id="m-morphnote"></div>
        <div class="m-note" style="opacity:.7;font-size:14px" id="m-morphcode"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* ============================================================
   DADOS — Gênesis 1:1-2 (Codex de Leningrado)
   No app em escala, estes campos virão do STEPBible (TAHOT)
   → Supabase, e a glosa_pt é gerada/cacheada por número Strong.
   ============================================================ */
const WORDS = [
  {v:1, s:"7225", heb:"בְּרֵאשִׁית", tr:"bə·rê·šîṯ", pt:"No princípio", en:"In the beginning", morph:"Prep-b | N-fs"},
  {v:1, s:"1254", heb:"בָּרָא",      tr:"bā·rā",      pt:"criou",        en:"created",         morph:"V-Qal-Perf-3ms"},
  {v:1, s:"430",  heb:"אֱלֹהִים",    tr:"’ĕ·lō·hîm",  pt:"Deus",         en:"God",             morph:"N-mp"},
  {v:1, s:"853",  heb:"אֵת",         tr:"’êṯ",        pt:"—",            en:"-",               morph:"DirObjM", mk:true},
  {v:1, s:"8064", heb:"הַשָּׁמַיִם",  tr:"haš·šā·ma·yim", pt:"os céus",  en:"the heavens",     morph:"Art | N-mp"},
  {v:1, s:"853",  heb:"וְאֵת",        tr:"wə·’êṯ",     pt:"e",            en:"and",             morph:"Conj-w | DirObjM"},
  {v:1, s:"776",  heb:"הָאָרֶץ׃",     tr:"hā·’ā·reṣ",  pt:"a terra",      en:"the earth",       morph:"Art | N-fs"},

  {v:2, s:"776",  heb:"וְהָאָרֶץ",    tr:"wə·hā·’ā·reṣ", pt:"E a terra",  en:"And the earth",   morph:"Conj-w, Art | N-fs"},
  {v:2, s:"1961", heb:"הָיְתָה",      tr:"hā·yə·ṯāh",  pt:"era",          en:"was",             morph:"V-Qal-Perf-3fs"},
  {v:2, s:"8414", heb:"תֹהוּ",       tr:"ṯō·hū",      pt:"sem forma",    en:"formless",        morph:"N-ms"},
  {v:2, s:"922",  heb:"וָבֹהוּ",      tr:"wā·ḇō·hū",   pt:"e vazia",      en:"and void",        morph:"Conj-w | N-ms"},
  {v:2, s:"2822", heb:"וְחֹשֶׁךְ",     tr:"wə·ḥō·šeḵ",  pt:"e trevas",     en:"and darkness",    morph:"Conj-w | N-ms"},
  {v:2, s:"5921", heb:"עַל־",         tr:"‘al-",       pt:"sobre",        en:"[was] over",      morph:"Prep"},
  {v:2, s:"6440", heb:"פְּנֵי",       tr:"pə·nê",      pt:"a face",       en:"the face",        morph:"N-cpc"},
  {v:2, s:"8415", heb:"תְהוֹם",       tr:"ṯə·hō·wm",   pt:"do abismo",    en:"of the deep",     morph:"N-cs"},
  {v:2, s:"7307", heb:"וְרוּחַ",      tr:"wə·rū·aḥ",   pt:"E o Espírito", en:"And the Spirit",  morph:"Conj-w | N-csc"},
  {v:2, s:"430",  heb:"אֱלֹהִים",     tr:"’ĕ·lō·hîm",  pt:"de Deus",      en:"of God",          morph:"N-mp"},
  {v:2, s:"7363", heb:"מְרַחֶפֶת",    tr:"mə·ra·ḥe·p̄eṯ", pt:"pairava",   en:"was hovering",    morph:"V-Piel-Prtcpl-fs"},
  {v:2, s:"5921", heb:"עַל־",         tr:"‘al-",       pt:"sobre",        en:"over",            morph:"Prep"},
  {v:2, s:"6440", heb:"פְּנֵי",       tr:"pə·nê",      pt:"a face",       en:"the face",        morph:"N-cpc"},
  {v:2, s:"4325", heb:"הַמָּיִם׃",    tr:"ham·mā·yim", pt:"das águas",    en:"of the waters",   morph:"Art | N-mp"}
];

const READING = {
  1:"No princípio, Deus criou os céus e a terra.",
  2:"E a terra era sem forma e vazia; havia trevas sobre a face do abismo, e o Espírito de Deus pairava sobre a face das águas."
};

/* Léxico Strong resumido em português (verbetes-chave) */
const STRONG = {
  "7225":"princípio, começo; a primeira parte, o mais importante ou o melhor de algo.",
  "1254":"criar, moldar, formar. No Qal, usado exclusivamente para a ação criadora de Deus — o chamar à existência.",
  "430":"Deus (’Elohim). Plural de majestade que, com verbo no singular, aponta para o único Deus verdadeiro.",
  "853":"partícula que marca o objeto direto definido. Não recebe tradução em português.",
  "8064":"céus, firmamento, o alto; a esfera celeste.",
  "776":"terra, chão, solo, país, mundo.",
  "1961":"ser, existir, tornar-se, acontecer.",
  "8414":"sem forma, vazio, informe; confusão, desolação.",
  "922":"vacuidade, vazio; ruína.",
  "2822":"escuridão, trevas; obscuridade.",
  "5921":"sobre, acima, por cima de, junto a.",
  "6440":"face, rosto, superfície, presença (do lado voltado para).",
  "8415":"abismo, profundeza, as águas profundas primordiais.",
  "7307":"espírito, vento, sopro, fôlego; o Espírito de Deus.",
  "7363":"pairar, mover-se sobre, chocar — como a ave que se agita protetora sobre o ninho.",
  "4325":"água, águas."
};

/* Análise gramatical → expansão em português.
   Em escala, virá da tabela TEHMC do STEPBible. */
const MORPH = {
  "Prep-b | N-fs":      {t:"Preposição prefixada (בְּ, “em/no”) + Substantivo, feminino singular"},
  "V-Qal-Perf-3ms":     {t:"Verbo — tronco Qal, Perfeito, 3ª pessoa masculino singular", n:"Qal: ação simples e ativa. Perfeito: ação concluída."},
  "N-mp":               {t:"Substantivo — masculino plural"},
  "DirObjM":            {t:"Partícula — marcador do objeto direto definido (אֵת)"},
  "Art | N-mp":         {t:"Artigo definido + Substantivo, masculino plural"},
  "Conj-w | DirObjM":   {t:"Conjunção waw (ו, “e”) + marcador do objeto direto"},
  "Art | N-fs":         {t:"Artigo definido + Substantivo, feminino singular"},
  "Conj-w, Art | N-fs": {t:"Conjunção waw (“e”) + Artigo definido + Substantivo, feminino singular"},
  "V-Qal-Perf-3fs":     {t:"Verbo — tronco Qal, Perfeito, 3ª pessoa feminino singular", n:"Concorda com “terra” (feminino em hebraico)."},
  "N-ms":               {t:"Substantivo — masculino singular"},
  "Conj-w | N-ms":      {t:"Conjunção waw (“e”) + Substantivo, masculino singular"},
  "Prep":               {t:"Preposição"},
  "N-cpc":              {t:"Substantivo — comum, plural, no estado construto", n:"Construto: liga-se à palavra seguinte (“a face de…”)."},
  "N-cs":               {t:"Substantivo — comum, singular"},
  "Conj-w | N-csc":     {t:"Conjunção waw (“e”) + Substantivo comum singular, construto"},
  "V-Piel-Prtcpl-fs":   {t:"Verbo — tronco Piel, Particípio, feminino singular", n:"Piel: aspecto intensivo/contínuo. Particípio: ação em curso — “estava pairando”."}
};

/* ---------- Render ---------- */
const textEl = document.getElementById('text');
function render(){
  const verses = [...new Set(WORDS.map(w=>w.v))];
  textEl.innerHTML = verses.map(vn=>{
    const cards = WORDS.filter(w=>w.v===vn).map((w,i)=>{
      const idx = WORDS.indexOf(w);
      return `<button class="word" data-idx="${idx}" aria-label="${w.pt} — Strong ${w.s}">
        <div class="strong">${w.s}</div>
        <div class="heb">${w.heb}</div>
        <div class="translit">${w.tr}</div>
        <div class="gloss${w.mk?' marker':''}">${w.pt}</div>
        <div class="gloss-en">${w.en}</div>
        <div class="morph">${w.morph.replace(/\|/g,'·')}</div>
      </button>`;
    }).join('');
    return `<section class="verse" data-verse="${vn}">
      <div class="verse-flow"><div class="vnum">${vn}</div>${cards}</div>
      <div class="reading"><span class="rlabel">Leitura</span>${READING[vn]}</div>
    </section>`;
  }).join('');
}
render();

/* ---------- Modal ---------- */
const overlay = document.getElementById('overlay');
function openWord(w){
  document.getElementById('m-strong').textContent = "Strong nº "+w.s;
  document.getElementById('m-heb').textContent = w.heb;
  document.getElementById('m-translit').textContent = w.tr;
  document.getElementById('m-gloss').textContent = w.mk ? "(sem tradução)" : w.pt;
  document.getElementById('m-glossen').textContent = "Inglês: "+w.en;
  document.getElementById('m-def').textContent = STRONG[w.s] || "—";
  const m = MORPH[w.morph] || {t:w.morph};
  document.getElementById('m-morph').textContent = m.t;
  document.getElementById('m-morphnote').textContent = m.n || "";
  document.getElementById('m-morphcode').textContent = "Código: "+w.morph;
  overlay.classList.add('open');
}
textEl.addEventListener('click',e=>{
  const c = e.target.closest('.word');
  if(c) openWord(WORDS[+c.dataset.idx]);
});
function closeModal(){overlay.classList.remove('open')}
document.getElementById('m-close').onclick = closeModal;
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* ---------- Toggles ---------- */
function toggle(btnId, cls, cond){
  const b = document.getElementById(btnId);
  b.addEventListener('click',()=>{
    const on = b.getAttribute('aria-pressed')==='true';
    b.setAttribute('aria-pressed', String(!on));
    document.body.classList.toggle(cls, cond ? on : !on);
  });
}
// Transliteração: começa ligada → classe "hide-translit" quando desligada
document.getElementById('t-translit').addEventListener('click',function(){
  const on = this.getAttribute('aria-pressed')==='true';
  this.setAttribute('aria-pressed', String(!on));
  document.body.classList.toggle('hide-translit', on);
});
toggle('t-en','show-en');
toggle('t-reading','show-reading');

/* ---------- Tema ---------- */
const themeBtn = document.getElementById('t-theme');
const ico = document.getElementById('theme-ico');
const sun = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
const moon = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
themeBtn.addEventListener('click',()=>{
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', dark?'light':'dark');
  ico.innerHTML = dark ? moon : sun;
});

/* ---------- Toast p/ navegação (fora do escopo do protótipo) ---------- */
const toast = document.getElementById('toast');
let tt;
function showToast(msg){
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(tt); tt = setTimeout(()=>toast.classList.remove('show'),2600);
}
document.querySelectorAll('[data-nav]').forEach(el=>{
  el.addEventListener('click',e=>{
    e.preventDefault();
    showToast('Protótipo: apenas Gênesis 1:1–2 está carregado.');
  });
});

/* ---------- Navegação por versículo (mobile) ---------- */
const verseEls = [...document.querySelectorAll('.verse')];
const pCount = document.getElementById('p-count');
const pPrev = document.getElementById('p-prev');
const pNext = document.getElementById('p-next');
let cur = 0;
const mql = window.matchMedia('(max-width:640px)');

function paint(){
  verseEls.forEach((el,i)=>el.classList.toggle('active', i===cur));
  const vn = verseEls[cur].dataset.verse;
  pCount.textContent = `Gênesis 1:${vn}`;
  pPrev.disabled = cur===0;
  pNext.disabled = cur===verseEls.length-1;
}
function applyMode(){
  if(mql.matches){
    document.body.classList.add('mobile');
    if(cur>verseEls.length-1) cur=0;
    paint();
    window.scrollTo({top:0});
  }else{
    document.body.classList.remove('mobile');
    verseEls.forEach(el=>el.classList.remove('active'));
  }
}
pPrev.addEventListener('click',()=>{ if(cur>0){cur--;paint();window.scrollTo({top:0,behavior:'smooth'});} });
pNext.addEventListener('click',()=>{ if(cur<verseEls.length-1){cur++;paint();window.scrollTo({top:0,behavior:'smooth'});} });
mql.addEventListener('change',applyMode);
applyMode();
</script>
</body>
