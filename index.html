<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia Interlinear — Gênesis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F1B33;--gold:#C9A227;--paper:#FAF7F0;--card:#FFFFFF;--ink:#0F1B33;
    --muted:#6B6456;--line:#E7E0D1;--gold-soft:rgba(201,162,39,.12);
    --shadow:0 1px 2px rgba(15,27,51,.05),0 8px 24px rgba(15,27,51,.06);
    --shadow-hi:0 2px 6px rgba(15,27,51,.08),0 14px 34px rgba(15,27,51,.12);--radius:14px;
  }
  [data-theme="dark"]{
    --navy:#0B1526;--gold:#D8B24A;--paper:#0B1526;--card:#12203C;--ink:#F3EFE4;
    --muted:#A9A28E;--line:#25355A;--gold-soft:rgba(216,178,74,.14);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px rgba(0,0,0,.35);
    --shadow-hi:0 2px 8px rgba(0,0,0,.4),0 16px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Cormorant Garamond",Georgia,serif;
    -webkit-font-smoothing:antialiased;transition:background .3s,color .3s;padding-bottom:64px;}

  .topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--paper) 82%,transparent);
    backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand-mark{width:34px;height:34px;border-radius:9px;flex:0 0 auto;background:linear-gradient(140deg,var(--navy),#1c2f52);
    display:grid;place-items:center;border:1px solid var(--gold);box-shadow:0 0 0 3px var(--gold-soft);}
  .brand-mark span{font-family:"Cinzel",serif;color:var(--gold);font-weight:700;font-size:16px;line-height:1}
  .brand-title{font-family:"Cinzel",serif;font-weight:600;font-size:15px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .pill{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.05em;padding:7px 12px;border-radius:999px;cursor:pointer;
    border:1px solid var(--line);background:transparent;color:var(--muted);transition:all .18s;user-select:none;white-space:nowrap;}
  .pill:hover{border-color:var(--gold);color:var(--ink)}
  .pill[aria-pressed="true"]{background:var(--navy);color:#F5EED8;border-color:var(--navy);}
  [data-theme="dark"] .pill[aria-pressed="true"]{background:var(--gold);color:var(--navy);border-color:var(--gold)}
  .icon-btn{width:38px;height:38px;border-radius:999px;border:1px solid var(--line);background:transparent;cursor:pointer;
    display:grid;place-items:center;color:var(--muted);transition:all .18s;}
  .icon-btn:hover{border-color:var(--gold);color:var(--gold)}
  .icon-btn.accent{border-color:var(--gold);color:var(--gold)}

  .chapter-nav{max-width:1180px;margin:28px auto 0;padding:0 20px;display:flex;align-items:center;justify-content:center;gap:20px;}
  .chapter-nav h1{font-family:"Cinzel",serif;font-weight:700;font-size:clamp(26px,5vw,40px);margin:0;letter-spacing:.02em;cursor:pointer;}
  .navarrow{background:transparent;border:none;cursor:pointer;color:var(--gold);font-size:26px;line-height:1;padding:6px 8px;border-radius:8px;transition:transform .15s,opacity .2s;}
  .navarrow:hover{transform:scale(1.15)}
  .navarrow:disabled{opacity:.3;cursor:default}

  .section-title{text-align:center;margin:26px auto 4px;}
  .section-title .kicker{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.34em;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:8px;}
  .section-title h2{font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:600;font-size:clamp(24px,4vw,34px);margin:0;color:var(--ink);}
  .xrefs{text-align:center;color:var(--muted);font-style:italic;font-size:17px;margin:4px 0 0;}
  .xrefs a{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold)}
  .rule{max-width:220px;margin:22px auto 6px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative;}
  .rule::after{content:"✦";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:var(--gold);font-size:12px;background:var(--paper);padding:0 10px;}

  main{max-width:1180px;margin:0 auto;padding:8px 16px 40px}
  .verse{margin:30px 0 8px;scroll-margin-top:90px}
  .verse-flow{direction:rtl;display:flex;flex-wrap:wrap;gap:12px;align-items:stretch;justify-content:flex-start;}
  .vnum{direction:ltr;flex:0 0 auto;align-self:center;width:34px;height:34px;border-radius:999px;display:grid;place-items:center;
    margin-inline-end:2px;font-family:"Cinzel",serif;font-weight:700;font-size:14px;color:var(--gold);border:1.5px solid var(--gold);background:var(--gold-soft);}
  .reading{direction:ltr;margin:14px 4px 0;padding:12px 16px;border-inline-start:3px solid var(--gold);background:var(--gold-soft);
    border-radius:0 10px 10px 0;font-size:20px;line-height:1.5;color:var(--ink);display:none;}
  body.show-reading .reading{display:block}
  .reading .rlabel{display:block;font-family:"Cinzel",serif;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}

  .word{direction:ltr;flex:0 0 auto;min-width:96px;max-width:150px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:12px 12px 10px;text-align:center;cursor:pointer;box-shadow:var(--shadow);position:relative;
    transition:transform .16s,box-shadow .16s,border-color .16s;}
  .word:hover,.word:focus-visible{transform:translateY(-3px);box-shadow:var(--shadow-hi);border-color:var(--gold);outline:none;}
  .word:focus-visible{box-shadow:var(--shadow-hi),0 0 0 3px var(--gold-soft)}
  .word.hl{border-color:var(--gold);box-shadow:var(--shadow-hi),0 0 0 3px var(--gold-soft)}
  .strong{font-family:"Cinzel",serif;font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--gold);margin-bottom:6px;display:inline-flex;align-items:center;gap:4px;}
  .strong::before{content:"⌗";font-size:11px;opacity:.7}
  .heb{font-family:"Frank Ruhl Libre",serif;direction:rtl;font-size:30px;line-height:1.25;color:var(--ink);margin:2px 0 6px;min-height:38px;font-weight:500;}
  .translit{font-style:italic;color:var(--muted);font-size:16px;line-height:1.2;margin-bottom:6px}
  body.hide-translit .translit{display:none}
  .gloss{font-size:20px;font-weight:600;color:var(--ink);line-height:1.15;margin-bottom:2px}
  .gloss.marker{color:var(--muted);font-weight:500}
  .gloss-en{font-size:14px;font-style:italic;color:var(--muted);line-height:1.1;margin-top:2px;display:none}
  body.show-en .gloss-en{display:block}
  .morph{margin-top:8px;padding-top:7px;border-top:1px dashed var(--line);font-family:"Cinzel",serif;font-size:9.5px;letter-spacing:.03em;color:var(--muted);}

  .placeholder{text-align:center;padding:80px 20px;color:var(--muted);font-style:italic;font-size:20px}
  .placeholder .big{font-family:"Cinzel",serif;font-style:normal;font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:block}

  .overlay{position:fixed;inset:0;background:rgba(11,21,38,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;}
  .overlay.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-top:4px solid var(--gold);border-radius:16px;max-width:440px;width:100%;
    box-shadow:var(--shadow-hi);padding:26px;position:relative;animation:pop .22s ease;max-height:88vh;overflow:auto;}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .modal .close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;}
  .modal .close:hover{border-color:var(--gold);color:var(--gold)}
  .m-strong{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.1em;color:var(--gold)}
  .m-heb{font-family:"Frank Ruhl Libre",serif;direction:rtl;font-size:44px;line-height:1.2;margin:6px 0 2px;color:var(--ink)}
  .m-translit{font-style:italic;font-size:20px;color:var(--muted);margin-bottom:14px}
  .m-row{margin:12px 0;padding-top:12px;border-top:1px solid var(--line)}
  .m-label{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:4px;}
  .m-value{font-size:19px;line-height:1.4;color:var(--ink)}
  .m-note{font-size:16px;font-style:italic;color:var(--muted);margin-top:5px}

  /* Busca */
  .modal.search h3{font-family:"Cinzel",serif;font-weight:600;font-size:16px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);margin:0 0 18px}
  .ref-input{display:flex;gap:8px;margin-bottom:18px}
  .ref-input input{flex:1;font-family:"Cormorant Garamond",serif;font-size:20px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);}
  .ref-input input:focus{outline:none;border-color:var(--gold)}
  .ref-input button,.go-btn{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.04em;padding:10px 18px;border-radius:10px;cursor:pointer;border:1px solid var(--gold);background:var(--navy);color:#F5EED8;}
  [data-theme="dark"] .ref-input button,[data-theme="dark"] .go-btn{background:var(--gold);color:var(--navy)}
  .field-label{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:14px 0 8px;display:block}
  .chip-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;max-height:180px;overflow:auto;padding:2px}
  .chip{font-family:"Cinzel",serif;font-size:12px;padding:8px 0;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
  .chip:hover:not(:disabled){border-color:var(--gold);color:var(--ink)}
  .chip.active{background:var(--navy);color:#F5EED8;border-color:var(--navy)}
  [data-theme="dark"] .chip.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
  .chip:disabled{opacity:.28;cursor:default}
  @media(max-width:480px){.chip-grid{grid-template-columns:repeat(6,1fr)}}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#F5EED8;padding:11px 20px;border-radius:999px;
    font-size:15px;box-shadow:var(--shadow-hi);opacity:0;pointer-events:none;transition:all .25s;z-index:60;border:1px solid var(--gold);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{text-align:center;color:var(--muted);font-size:14px;font-style:italic;padding:10px 20px 4px;}

  .pager{display:none;position:fixed;left:0;right:0;bottom:0;z-index:30;background:color-mix(in srgb,var(--paper) 88%,transparent);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:10px 16px calc(10px + env(safe-area-inset-bottom));align-items:center;justify-content:space-between;gap:12px;}
  .pager button{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.04em;padding:9px 16px;border-radius:999px;cursor:pointer;
    border:1px solid var(--gold);background:var(--navy);color:#F5EED8;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s,transform .12s;}
  [data-theme="dark"] .pager button{background:var(--gold);color:var(--navy)}
  .pager button:active{transform:scale(.96)}
  .pager button:disabled{opacity:.35;cursor:default;background:transparent;color:var(--muted);border-color:var(--line)}
  .pager .counter{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.08em;color:var(--gold);cursor:pointer}
  body.mobile .pager{display:flex}
  body.mobile{padding-bottom:80px}
  body.mobile .verse{display:none}
  body.mobile .verse.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  body.mobile footer{display:none}

  @media(max-width:520px){
    .word{min-width:78px;max-width:31vw;padding:10px 8px 8px}
    .heb{font-size:25px;min-height:32px}.gloss{font-size:17px}.translit{font-size:14px}
    .brand-title{display:none}.verse-flow{gap:8px}.reading{font-size:18px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

  <!-- Modal de busca -->
  <div class="overlay" id="search-overlay">

"tr":"Yom","s":"3117","sfull":"H3117G","morph":"HNcmsc","en":"[the] day","pt":"o dia"},{"v":31,"n":15,"heb":"הַשִּׁשִּֽׁי׃ פ","tr":"ha·shi·Shi","s":"8345","sfull":"H8345","morph":"HTd/Aomsa","en":"<the> sixth","pt":"o sexto"}]}]}</script>
<script>
const FALLBACK = JSON.parse(document.getElementById('data').textContent); // prévia offline: Gênesis 1
const SUPA_URL = 'https://ghjbljypxksubmcsvaig.supabase.co';
const SUPA_KEY = 'sb_publishable_qXCYqg1WdmelY9D1mptZXg_U8NdoKby'; // chave publicável: vai só no header apikey
const BOOK = 'Gen';
const TOTAL_CAPS = 50;                      // Gênesis tem 50 capítulos
let loadedCaps = [...new Set(FALLBACK.versos.map(v=>v.cap))];
let curCap = loadedCaps[0] || 1;

/* ---------- Léxico Strong (verbetes-chave em PT) ---------- */
const STRONG_PT = {
 "7225":"princípio, começo; a primeira e mais importante parte de algo.",
 "1254":"criar, moldar. No Qal, exclusivo da ação criadora de Deus — chamar à existência.",
 "430":"Deus (’Elohim). Plural de majestade que, com verbo no singular, aponta o único Deus verdadeiro.",
 "853":"partícula que marca o objeto direto definido; não se traduz.",
 "8064":"céus, firmamento, o alto; a esfera celeste.",
 "776":"terra, chão, solo, país, mundo.",
 "1961":"ser, existir, tornar-se, acontecer.",
 "8414":"sem forma, vazio, informe; confusão, desolação.",
 "922":"vacuidade, vazio; ruína.",
 "2822":"escuridão, trevas.",
 "5921":"sobre, acima, por cima de.",
 "6440":"face, rosto, superfície, presença.",
 "8415":"abismo, profundeza; as águas primordiais.",
 "7307":"espírito, vento, sopro, fôlego; o Espírito de Deus.",
 "7363":"pairar, mover-se sobre, chocar — como a ave sobre o ninho.",
 "4325":"água, águas.",
 "559":"dizer, falar, ordenar.",
 "216":"luz, claridade, luminosidade.",
 "7200":"ver, olhar, perceber, considerar.",
 "3117":"dia; período de luz; tempo.",
 "6960":"ajuntar-se, reunir-se; esperar.",
 "1288":"abençoar, ajoelhar-se para bendizer.",
 "6529":"fruto; produção, resultado.",
 "2233":"semente, descendência, posteridade.",
 "120":"homem, ser humano, humanidade (Adão).",
 "3335":"formar, modelar (como o oleiro).",
 "6754":"imagem, semelhança, estátua.",
};

/* ---------- Decodificador de morfologia (OSHB/STEPBible) -> PT ---------- */
const POS={V:"Verbo",N:"Substantivo",A:"Adjetivo",C:"Conjunção",R:"Preposição",T:"Partícula",S:"Sufixo",P:"Pronome",D:"Advérbio"};
const STEM={q:"Qal",N:"Nifal",p:"Piel",P:"Pual",h:"Hifil",H:"Hofal",t:"Hitpael",o:"Polel",r:"Poel",v:"Hitpolel"};
const VTYPE={p:"Perfeito",q:"Perfeito consecutivo",i:"Imperfeito",w:"Imperfeito consecutivo (wayyiqtol)",j:"Jussivo",u:"Coortativo",v:"Imperativo",r:"Particípio ativo",s:"Particípio passivo",a:"Infinitivo absoluto",c:"Infinitivo construto"};
const GEN={m:"masculino",f:"feminino",c:"comum",b:"comum"};
const NUM={s:"singular",p:"plural",d:"dual"};
const STATE={a:"absoluto",c:"construto",d:"determinado"};
const PART={d:"Artigo definido",o:"Partícula de objeto direto (אֵת)",r:"Partícula relativa",c:"Partícula conjuntiva",j:"Partícula interrogativa",m:"Partícula demonstrativa",n:"Partícula negativa",e:"Partícula de ênfase"};

function decodeSeg(seg){
  if(!seg) return "";
  let p=seg[0], rest=seg.slice(1);
  if(p==="C"||p==="c") return "Conjunção (waw “e”)";
  if(p==="R"){ return rest==="d" ? "Preposição + artigo" : "Preposição"; }
  if(p==="T"){ return PART[rest]||"Partícula"; }
  if(p==="D") return "Advérbio";
  if(p==="S"){ // sufixo, ex.: Sp3ms
    let m=rest.match(/p?(\d)([mfcb])([spd])/);
    if(m) return `Sufixo pronominal — ${m[1]}ª pessoa ${GEN[m[2]]} ${NUM[m[3]]}`;
    return "Sufixo pronominal";
  }
  if(p==="V"){
    let stem=STEM[rest[0]]||"", t=rest[1], out=`Verbo — ${stem}`.trim();
    if(VTYPE[t]) out+=`, ${VTYPE[t]}`;
    let pf=rest.slice(2), pm=pf.match(/(\d)?([mfcb])?([spd])?/);
    if(pm && (pm[1]||pm[2]||pm[3])){
      let bits=[]; if(pm[1])bits.push(`${pm[1]}ª pessoa`); if(pm[2])bits.push(GEN[pm[2]]); if(pm[3])bits.push(NUM[pm[3]]);
      if(bits.length) out+=`, ${bits.join(" ")}`;
    }
    return out;
  }
  if(p==="N"){
    let ty=rest[0]==="p"?"próprio":"comum", g=rest[1],n=rest[2],st=rest[3];
    let out=`Substantivo ${ty}`; let bits=[];
    if(GEN[g])bits.push(GEN[g]); if(NUM[n])bits.push(NUM[n]);
    if(bits.length) out+=` — ${bits.join(" ")}`;
    if(STATE[st]) out+=`, ${STATE[st]}`;
    return out;
  }
  if(p==="A"){
    let ty={a:"Adjetivo",c:"Numeral cardinal",o:"Numeral ordinal",g:"Gentílico"}[rest[0]]||"Adjetivo";
    let g=rest[1],n=rest[2],st=rest[3],bits=[];
    if(GEN[g])bits.push(GEN[g]); if(NUM[n])bits.push(NUM[n]);
    let out=ty; if(bits.length)out+=` — ${bits.join(" ")}`; if(STATE[st])out+=`, ${STATE[st]}`;
    return out;
  }
  if(p==="P") return "Pronome";
  return seg;
}
function decodeMorph(code){
  let lang = code[0]==="A" ? "aramaico" : "hebraico";
  let body = code.replace(/^[HA]/,"");
  return body.split("/").map(decodeSeg).filter(Boolean).join("  +  ");
}

/* ---------- Render ---------- */
const textEl=document.getElementById('text');
const chTitle=document.getElementById('ch-title');
const CH={};                                 // cache por capítulo
function versesOf(cap){ return CH[cap]||[]; }
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function groupRows(rows,cap){
  const by={};
  rows.forEach(r=>{(by[r.vers]=by[r.vers]||[]).push({v:r.vers,n:r.ord,heb:r.heb,tr:r.tr,s:r.strong,sfull:r.sfull,morph:r.morph,en:r.en,pt:r.pt});});
  return Object.keys(by).map(Number).sort((a,b)=>a-b)
    .map(v=>({ref:BOOK+' '+cap+':'+v,cap,vers:v,palavras:by[v].sort((a,b)=>a.n-b.n)}));
}
async function ensureChapter(cap){
  if(CH[cap]) return;
  if(SUPA_URL){
    try{
      const url=`${SUPA_URL}/rest/v1/interlinear?livro=eq.${BOOK}&cap=eq.${cap}&order=vers.asc,ord.asc&select=*`;
      const r=await fetch(url,{headers:{apikey:SUPA_KEY}});
      if(r.ok){ const rows=await r.json(); if(rows.length){ CH[cap]=groupRows(rows,cap); return; } }
    }catch(e){}
  }
  CH[cap]=FALLBACK.versos.filter(v=>v.cap===cap);   // reserva local (só Gênesis 1)
}

function autoReading(pal){
  return pal.map(w=>w.pt).filter(x=>x&&x!=="—").map(x=>x==="e —"?"e":x).join(" ")
           .replace(/\s+/g," ").replace(/^./,c=>c.toUpperCase()) + ".";
}

async function render(cap){
  curCap=cap; chTitle.textContent="Gênesis "+cap;
  document.querySelector('.section-title').style.display = cap===1?'block':'none';
  document.getElementById('xrefs').style.display = cap===1?'block':'none';
  textEl.innerHTML=`<div class="placeholder"><span class="big">Gênesis ${cap}</span>Carregando…</div>`;
  try{ await ensureChapter(cap); }catch(e){}
  if(cap!==curCap) return;               // usuário já mudou de capítulo
  const vs=versesOf(cap);
  if(!vs.length){
    textEl.innerHTML=`<div class="placeholder"><span class="big">Capítulo ${cap}</span>Este capítulo ainda não está disponível no banco.</div>`;
  }else{
    textEl.innerHTML=vs.map(vv=>{
      const cards=vv.palavras.map((w,i)=>`
        <button class="word" data-c="${vv.cap}" data-v="${vv.vers}" data-i="${i}" aria-label="${esc(w.pt||w.en)} — Strong ${esc(w.s)}">
          <div class="strong">${esc(w.s)}</div>
          <div class="heb">${esc(w.heb)}</div>
          <div class="translit">${esc(w.tr)}</div>
          <div class="gloss${w.pt==='—'?' marker':''}">${esc(w.pt||w.en)}</div>
          <div class="gloss-en">${esc(w.en)}</div>
          <div class="morph">${esc(w.morph.replace(/\//g,'·'))}</div>
        </button>`).join('');
      return `<section class="verse" id="v-${vv.cap}-${vv.vers}" data-verse="${vv.vers}">
        <div class="verse-flow"><div class="vnum">${vv.vers}</div>${cards}</div>
        <div class="reading"><span class="rlabel">Leitura — palavra a palavra</span>${esc(autoReading(vv.palavras))}</div>
      </section>`;
    }).join('');
  }
  buildVerseGrid();
  updateChapNav();
  if(document.body.classList.contains('mobile')){ cur=0; setupPager(); }
}
function updateChapNav(){
  document.getElementById('ch-prev').disabled = !loadedCaps.includes(curCap-1);
  document.getElementById('ch-next').disabled = !loadedCaps.includes(curCap+1);
}

/* ---------- Modal da palavra ---------- */
const overlay=document.getElementById('overlay');
function openWord(w){
  document.getElementById('m-strong').textContent="Strong nº "+w.s;
  document.getElementById('m-heb').textContent=w.heb;
  document.getElementById('m-translit').textContent=w.tr;
  document.getElementById('m-gloss').textContent=w.pt==='—'?'(sem tradução)':(w.pt||w.en);
  document.getElementById('m-glossen').textContent="Inglês: "+w.en;
  document.getElementById('m-morph').textContent=decodeMorph(w.morph);
  document.getElementById('m-morphcode').textContent="Código: "+w.morph;
  document.getElementById('m-def').textContent=STRONG_PT[w.s]||"Definição completa virá do léxico em português (etapa em lote).";
  overlay.classList.add('open');
}
textEl.addEventListener('click',e=>{
  const c=e.target.closest('.word'); if(!c)return;
  const vv=versesOf(+c.dataset.c).find(x=>x.vers===+c.dataset.v);
  openWord(vv.palavras[+c.dataset.i]);
});
document.getElementById('m-close').onclick=()=>overlay.classList.remove('open');
overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('open')});

/* ---------- Busca / ir para ---------- */
const sOverlay=document.getElementById('search-overlay');
function openSearch(){ buildChapGrid(); sOverlay.classList.add('open'); setTimeout(()=>document.getElementById('ref-text').focus(),80); }
function closeSearch(){ sOverlay.classList.remove('open'); }
document.getElementById('btn-search').onclick=openSearch;
chTitle.onclick=openSearch;
document.getElementById('s-close').onclick=closeSearch;
sOverlay.addEventListener('click',e=>{if(e.target===sOverlay)closeSearch()});

function buildChapGrid(){
  const g=document.getElementById('chap-grid'); g.innerHTML='';
  for(let c=1;c<=TOTAL_CAPS;c++){
    const b=document.createElement('button');
    b.className='chip'+(c===curCap?' active':''); b.textContent=c;
    b.disabled=!loadedCaps.includes(c);
    if(b.disabled) b.title='Em breve';
    b.onclick=()=>{ if(!b.disabled){ render(c); buildChapGrid(); } };
    g.appendChild(b);
  }
}
function buildVerseGrid(){
  const g=document.getElementById('verse-grid'); if(!g)return; g.innerHTML='';
  versesOf(curCap).forEach(vv=>{
    const b=document.createElement('button'); b.className='chip'; b.textContent=vv.vers;
    b.onclick=()=>{ jumpToVerse(curCap,vv.vers); closeSearch(); };
    g.appendChild(b);
  });
}
async function jumpToVerse(cap,vers){
  if(cap!==curCap){ if(!loadedCaps.includes(cap)){showToast('Capítulo '+cap+' indisponível.');return;} await render(cap); }
  if(document.body.classList.contains('mobile')){
    const idx=versesOf(curCap).findIndex(v=>v.vers===vers); if(idx>=0){cur=idx;paint();}
  }else{
    const el=document.getElementById(`v-${cap}-${vers}`);
    if(el){ el.scrollIntoView({behavior:'smooth',block:'start'});
      const first=el.querySelector('.word'); if(first){first.classList.add('hl');setTimeout(()=>first.classList.remove('hl'),1600);} }
  }
}
document.getElementById('ref-go').onclick=doRefJump;
document.getElementById('ref-text').addEventListener('keydown',e=>{if(e.key==='Enter')doRefJump();});
function doRefJump(){
  const t=document.getElementById('ref-text').value.trim();
  let m=t.match(/^(\d+)\s*[:.\s]\s*(\d+)$/)||t.match(/^(\d+)$/);
  if(!m){showToast('Use o formato capítulo:versículo — ex.: 1:5');return;}
  const cap=m[2]?+m[1]:curCap, vers=m[2]?+m[2]:+m[1];
  const vv=loadedCaps.includes(cap)&&versesOf(cap).some(v=>v.vers===vers);
  if(!vv){showToast('Referência não encontrada (Gênesis '+cap+':'+vers+').');return;}
  jumpToVerse(cap,vers); closeSearch();
}
document.querySelectorAll('[data-jump]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();showToast('Referências paralelas (João / Hebreus) entram quando carregarmos o NT.');}));

/* ---------- Toggles / tema ---------- */
document.getElementById('t-translit').addEventListener('click',function(){const on=this.getAttribute('aria-pressed')==='true';this.setAttribute('aria-pressed',String(!on));document.body.classList.toggle('hide-translit',on);});
function toggleBody(id,cls){const b=document.getElementById(id);b.addEventListener('click',()=>{const on=b.getAttribute('aria-pressed')==='true';b.setAttribute('aria-pressed',String(!on));document.body.classList.toggle(cls,!on);});}
toggleBody('t-en','show-en'); toggleBody('t-reading','show-reading');
const themeBtn=document.getElementById('t-theme'),ico=document.getElementById('theme-ico');
const sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
const moon='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
themeBtn.addEventListener('click',()=>{const dark=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',dark?'light':'dark');ico.innerHTML=dark?moon:sun;});

/* ---------- Navegação de capítulo ---------- */
document.getElementById('ch-prev').onclick=()=>{ if(loadedCaps.includes(curCap-1))render(curCap-1); };
document.getElementById('ch-next').onclick=()=>{ loadedCaps.includes(curCap+1)?render(curCap+1):showToast('Capítulo '+(curCap+1)+' em breve.'); };

/* ---------- Toast ---------- */
const toast=document.getElementById('toast');let tt;
function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),2600);}

/* ---------- Pager mobile ---------- */
const pCount=document.getElementById('p-count'),pPrev=document.getElementById('p-prev'),pNext=document.getElementById('p-next');
let cur=0,verseEls=[];
function setupPager(){ verseEls=[...document.querySelectorAll('.verse')]; if(cur>verseEls.length-1)cur=0; paint(); }
function paint(){
  verseEls.forEach((el,i)=>el.classList.toggle('active',i===cur));
  if(verseEls[cur]){ pCount.textContent='Gênesis '+curCap+':'+verseEls[cur].dataset.verse; window.scrollTo({top:0}); }
  pPrev.disabled=cur===0; pNext.disabled=cur===verseEls.length-1;
}
pPrev.onclick=()=>{if(cur>0){cur--;paint();}};
pNext.onclick=()=>{if(cur<verseEls.length-1){cur++;paint();}};
pCount.onclick=openSearch;
const mql=window.matchMedia('(max-width:640px)');
function applyMode(){ if(mql.matches){document.body.classList.add('mobile');setupPager();}else{document.body.classList.remove('mobile');verseEls.forEach(el=>el.classList.remove('active'));} }
mql.addEventListener('change',applyMode);

/* ---------- Início: descobre nº de capítulos no Supabase; se falhar, usa a prévia ---------- */
async function boot(){
  let total=null;
  if(SUPA_URL){
    try{
      const r=await fetch(`${SUPA_URL}/rest/v1/livros?livro=eq.${BOOK}&select=total_caps`,{headers:{apikey:SUPA_KEY}});
      if(r.ok){ const j=await r.json(); if(j[0]&&j[0].total_caps) total=j[0].total_caps; }
    }catch(e){}
  }
  loadedCaps = total ? Array.from({length:total},(_,i)=>i+1)
                     : [...new Set(FALLBACK.versos.map(v=>v.cap))].sort((a,b)=>a-b);
  curCap = loadedCaps.includes(1)?1:loadedCaps[0];
  await render(curCap); applyMode();
  showToast(total ? `Gênesis — ${total} capítulos (Supabase)` : 'Prévia local (Gênesis 1). Carregue os dados no Supabase.');
}
boot();
</script>
